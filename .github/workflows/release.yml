name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle and DMG
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
        run: ./scripts/build.sh "${{ steps.version.outputs.version }}"

      - name: Update appcast.xml
        if: env.SPARKLE_SIGNING_KEY != ''
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
        run: ./scripts/update-appcast.sh

      - name: Commit and push appcast
        if: env.SPARKLE_SIGNING_KEY != ''
        env:
          SPARKLE_SIGNING_KEY: ${{ secrets.SPARKLE_SIGNING_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git add appcast.xml
          git commit -m "Update appcast.xml for v${{ steps.version.outputs.version }}" || true
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            .build-app/Beads-${{ steps.version.outputs.version }}-macOS.dmg
            .build-app/Beads-${{ steps.version.outputs.version }}-macOS.zip
