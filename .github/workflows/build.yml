name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cd Beads && swift build -c release

      - name: Run tests
        run: cd Beads && swift test
        continue-on-error: true
